<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Personal Post — AI Quote — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 100px;
      }
      .dots {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(112, 101, 239, 0.04) 1px,
          transparent 1px
        );
        background-size: 20px 20px;
      }
      .quote-mark {
        position: absolute;
        top: 60px;
        left: 80px;
        font-size: 200px;
        font-weight: 800;
        color: #7065ef;
        opacity: 0.15;
        line-height: 1;
        font-family: Georgia, serif;
      }
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 900px;
      }
      .line1 {
        font-size: 28px;
        font-weight: 700;
        color: #e9e9e9;
        line-height: 1.5;
        margin-bottom: 16px;
      }
      .line2 {
        font-size: 34px;
        font-weight: 700;
        color: #7065ef;
        line-height: 1.4;
      }
      .author {
        position: absolute;
        bottom: 50px;
        right: 100px;
        font-size: 15px;
        font-weight: 400;
        color: #c4c4c4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dots"></div>
      <div class="quote-mark">"</div>
      <div class="content">
        <div class="line1">
          The next wave of AI isn't about making<br />the privileged more
          efficient.
        </div>
        <div class="line2">It's about making the invisible visible.</div>
      </div>
      <div class="author">— Michel Wen</div>
    </div>
  </body>
</html>
