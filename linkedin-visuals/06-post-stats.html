<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Post 3 — The Problem (Statistics) — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 60px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        width: 100%;
        max-width: 960px;
      }
      .stat-card {
        background: #111111;
        border: 1px solid #1a1a2e;
        border-radius: 16px;
        padding: 36px 32px;
        text-align: center;
      }
      .stat-number {
        font-size: 56px;
        font-weight: 800;
        color: #7065ef;
        line-height: 1;
        margin-bottom: 8px;
      }
      .stat-label {
        font-size: 16px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 4px;
      }
      .stat-detail {
        font-size: 13px;
        font-weight: 400;
        color: #e9e9e9;
        opacity: 0.7;
      }
      .footer-text {
        position: absolute;
        bottom: 24px;
        font-size: 13px;
        font-weight: 400;
        color: #c4c4c4;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="grid">
        <div class="stat-card">
          <div class="stat-number">7,000+</div>
          <div class="stat-label">languages exist</div>
          <div class="stat-detail">AI supports &lt; 100</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">2.7B</div>
          <div class="stat-label">people never used</div>
          <div class="stat-detail">the internet</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">1/3</div>
          <div class="stat-label">of all food produced</div>
          <div class="stat-detail">is wasted globally</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">828M</div>
          <div class="stat-label">people face</div>
          <div class="stat-detail">hunger daily</div>
        </div>
      </div>
      <div class="footer-text">MEYNG — AI That Matters</div>
    </div>
  </body>
</html>
