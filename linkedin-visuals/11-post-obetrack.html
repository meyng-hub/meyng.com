<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ob&ecirc;track Introduction — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
      }
      .left {
        width: 40%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      .icon {
        width: 90px;
        height: 90px;
        border-radius: 24px;
        background: rgba(34, 197, 94, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }
      .icon svg {
        width: 48px;
        height: 48px;
      }
      .product-name {
        font-size: 36px;
        font-weight: 700;
        color: #e9e9e9;
        margin-bottom: 8px;
      }
      .product-sub {
        font-size: 14px;
        font-weight: 400;
        color: #c4c4c4;
        text-align: center;
      }
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        gap: 20px;
      }
      .stat-card {
        background: #111111;
        border: 1px solid #1a1a2e;
        border-radius: 12px;
        padding: 20px 36px;
        width: 100%;
        max-width: 440px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .stat-num {
        font-size: 40px;
        font-weight: 800;
        color: #22c55e;
        min-width: 100px;
      }
      .stat-text {
        font-size: 15px;
        font-weight: 400;
        color: #c4c4c4;
      }
      .footer {
        position: absolute;
        bottom: 24px;
        font-size: 12px;
        color: #c4c4c4;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="left">
        <div class="icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#22C55E"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M6.5 2C5 2 3.5 3.5 3 5c-.5 1.5 0 3.5 1 4.5s3 2 4 3c2.5 2.5 3 3.5 3.5 5.5.5-2 1-3 3.5-5.5 1-1 2.5-2 3.5-3s1.5-3 1-4.5C18.5 3.5 17 2 15.5 2 14 2 12 3.5 12 5.5 12 3.5 10 2 6.5 2z"
            />
            <path d="M12 22v-7" />
          </svg>
        </div>
        <div class="product-name">Ob&ecirc;track</div>
        <div class="product-sub">Reducing Food Waste with AI</div>
      </div>
      <div class="right">
        <div class="stat-card">
          <div class="stat-num">1/3</div>
          <div class="stat-text">food wasted globally</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">30%</div>
          <div class="stat-text">waste reduction target</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">828M</div>
          <div class="stat-text">people face hunger</div>
        </div>
      </div>
      <div class="footer">MEYNG — AI That Matters</div>
    </div>
  </body>
</html>
