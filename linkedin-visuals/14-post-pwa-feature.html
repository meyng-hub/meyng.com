<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PWA Feature Spotlight — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
        padding: 60px 80px;
      }
      .left {
        width: 45%;
      }
      .badge {
        display: inline-block;
        background: rgba(112, 101, 239, 0.15);
        color: #7065ef;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 14px;
        border-radius: 20px;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .title {
        font-size: 40px;
        font-weight: 700;
        color: #e9e9e9;
        line-height: 1.3;
        margin-bottom: 12px;
      }
      .subtitle {
        font-size: 16px;
        font-weight: 400;
        color: #c4c4c4;
        line-height: 1.6;
      }
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-left: 60px;
      }
      .feature-row {
        display: flex;
        align-items: center;
        gap: 16px;
        background: #111111;
        border: 1px solid #1a1a2e;
        border-radius: 12px;
        padding: 18px 24px;
      }
      .check {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(112, 101, 239, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .check svg {
        width: 16px;
        height: 16px;
      }
      .feature-label {
        font-size: 16px;
        font-weight: 500;
        color: #e9e9e9;
      }
      .url {
        position: absolute;
        bottom: 28px;
        right: 60px;
        font-size: 14px;
        font-weight: 500;
        color: #7065ef;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="left">
        <div class="badge">SANGOAI FEATURE</div>
        <div class="title">Works Everywhere.<br />No App Store Needed.</div>
        <div class="subtitle">
          Progressive Web App — installs directly from any browser
        </div>
      </div>
      <div class="right">
        <div class="feature-row">
          <div class="check">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#7065EF"
              stroke-width="3"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div class="feature-label">No app store download</div>
        </div>
        <div class="feature-row">
          <div class="check">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#7065EF"
              stroke-width="3"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div class="feature-label">Works offline after first visit</div>
        </div>
        <div class="feature-row">
          <div class="check">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#7065EF"
              stroke-width="3"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div class="feature-label">Minimal storage &amp; data usage</div>
        </div>
        <div class="feature-row">
          <div class="check">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#7065EF"
              stroke-width="3"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div class="feature-label">Works on any device with a browser</div>
        </div>
      </div>
      <div class="url">sangoai.sbs</div>
    </div>
  </body>
</html>
