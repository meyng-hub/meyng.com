<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Post 4 — Behind the Tech — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
      }
      .left {
        width: 38%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      .built-for {
        font-size: 20px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 4px;
      }
      .impact {
        font-size: 56px;
        font-weight: 800;
        color: #7065ef;
        line-height: 1;
        margin-bottom: 20px;
      }
      .logo-small {
        font-size: 18px;
        font-weight: 700;
        color: #e9e9e9;
        letter-spacing: 4px;
        opacity: 0.5;
      }
      .right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      .terminal {
        background: #111111;
        border: 1px solid #1a1a2e;
        border-radius: 12px;
        width: 100%;
        max-width: 580px;
        overflow: hidden;
      }
      .terminal-bar {
        background: #1a1a2e;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .dot-red {
        background: #ff5f57;
      }
      .dot-yellow {
        background: #febc2e;
      }
      .dot-green {
        background: #28c840;
      }
      .terminal-body {
        padding: 24px 28px;
        font-family: "Fira Code", monospace;
        font-size: 15px;
        line-height: 2;
      }
      .key {
        color: #7065ef;
      }
      .val {
        color: #e9e9e9;
      }
      .punc {
        color: #c4c4c4;
      }
      .comment {
        color: #555;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="left">
        <div class="built-for">Built for</div>
        <div class="impact">Impact</div>
        <div class="logo-small">MEYNG</div>
      </div>
      <div class="right">
        <div class="terminal">
          <div class="terminal-bar">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
          </div>
          <div class="terminal-body">
            <span class="punc">stack</span> <span class="punc">=</span>
            <span class="punc">{</span><br />
            &nbsp;&nbsp;<span class="key">frontend</span
            ><span class="punc">:</span>
            <span class="val">'React + TypeScript'</span
            ><span class="punc">,</span><br />
            &nbsp;&nbsp;<span class="key">backend</span
            ><span class="punc">:</span>&nbsp;
            <span class="val">'AWS Lambda (Python)'</span
            ><span class="punc">,</span><br />
            &nbsp;&nbsp;<span class="key">ai</span
            ><span class="punc">:</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <span class="val">'Claude 3.5 Sonnet'</span
            ><span class="punc">,</span><br />
            &nbsp;&nbsp;<span class="key">auth</span
            ><span class="punc">:</span>&nbsp;&nbsp;&nbsp;&nbsp;
            <span class="val">'AWS Cognito'</span><span class="punc">,</span
            ><br />
            &nbsp;&nbsp;<span class="key">db</span
            ><span class="punc">:</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <span class="val">'DynamoDB'</span><span class="punc">,</span><br />
            &nbsp;&nbsp;<span class="key">payments</span
            ><span class="punc">:</span>
            <span class="val">'Stripe + MTN MoMo'</span
            ><span class="punc">,</span><br />
            &nbsp;&nbsp;<span class="key">hosting</span
            ><span class="punc">:</span>&nbsp;
            <span class="val">'Vercel + AWS'</span><br />
            <span class="punc">}</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
