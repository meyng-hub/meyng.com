<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>eNdara Introduction — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .phone {
        width: 220px;
        height: 300px;
        border: 3px solid #f59e0b;
        border-radius: 24px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 30px 16px;
        gap: 12px;
        margin-bottom: 32px;
      }
      .phone::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: #f59e0b;
        border-radius: 2px;
        opacity: 0.5;
      }
      .phone::after {
        content: "";
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 30px;
        height: 30px;
        border: 2px solid rgba(245, 158, 11, 0.4);
        border-radius: 50%;
      }
      .bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 12px;
        line-height: 1.4;
      }
      .bubble-left {
        background: #1a1a2e;
        color: #e9e9e9;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      .bubble-right {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        font-weight: 700;
      }
      .product-name {
        font-size: 36px;
        font-weight: 700;
        color: #e9e9e9;
        margin-bottom: 6px;
      }
      .product-sub {
        font-size: 14px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 10px;
      }
      .product-motto {
        font-size: 17px;
        font-weight: 400;
        color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="phone">
        <div class="bubble bubble-left">What is 7 x 8?</div>
        <div class="bubble bubble-right">56!</div>
        <div class="bubble bubble-left">Correct! Next question...</div>
      </div>
      <div class="product-name">eNdara</div>
      <div class="product-sub">SMS-Based Learning for All</div>
      <div class="product-motto">
        No internet. No smartphone. Just knowledge.
      </div>
    </div>
  </body>
</html>
