<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Monthly Recap — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
        padding: 50px 70px;
      }
      .glow {
        position: absolute;
        bottom: -150px;
        left: 50%;
        transform: translateX(-50%);
        width: 900px;
        height: 500px;
        background: radial-gradient(
          ellipse,
          rgba(112, 101, 239, 0.06) 0%,
          transparent 70%
        );
      }
      .left {
        width: 40%;
        position: relative;
        z-index: 1;
      }
      .badge {
        display: inline-block;
        background: rgba(112, 101, 239, 0.15);
        color: #7065ef;
        font-size: 11px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 20px;
        margin-bottom: 16px;
        letter-spacing: 2px;
      }
      .title {
        font-size: 40px;
        font-weight: 700;
        color: #e9e9e9;
        line-height: 1.2;
        margin-bottom: 8px;
      }
      .subtitle {
        font-size: 16px;
        font-weight: 400;
        color: #c4c4c4;
      }
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-left: 60px;
        position: relative;
        z-index: 1;
      }
      .milestone {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 0;
        border-bottom: 1px solid #1a1a2e;
      }
      .milestone:last-child {
        border-bottom: none;
      }
      .m-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .m-dot-live {
        background: #22c55e;
      }
      .m-dot-dev {
        background: #f59e0b;
      }
      .m-dot-plan {
        background: #3b82f6;
      }
      .m-text {
        font-size: 16px;
        color: #e9e9e9;
      }
      .m-status {
        font-size: 12px;
        font-weight: 600;
        margin-left: auto;
        padding: 4px 10px;
        border-radius: 8px;
      }
      .status-live {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
      }
      .status-dev {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
      }
      .status-plan {
        background: rgba(59, 130, 246, 0.15);
        color: #3b82f6;
      }
      .url {
        position: absolute;
        bottom: 24px;
        right: 50px;
        font-size: 13px;
        color: #7065ef;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glow"></div>
      <div class="left">
        <div class="badge">MONTH 1 RECAP</div>
        <div class="title">MEYNG<br />Progress</div>
        <div class="subtitle">Here's where we stand.</div>
      </div>
      <div class="right">
        <div class="milestone">
          <div class="m-dot m-dot-live"></div>
          <div class="m-text">SangoAI — Live at sangoai.sbs</div>
          <div class="m-status status-live">LIVE</div>
        </div>
        <div class="milestone">
          <div class="m-dot m-dot-dev"></div>
          <div class="m-text">Ob&ecirc;track — AI food waste tracker</div>
          <div class="m-status status-dev">IN DEV</div>
        </div>
        <div class="milestone">
          <div class="m-dot m-dot-dev"></div>
          <div class="m-text">eNdara — SMS-based learning</div>
          <div class="m-status status-dev">IN DEV</div>
        </div>
        <div class="milestone">
          <div class="m-dot m-dot-plan"></div>
          <div class="m-text">ConnectZ — NGO project management</div>
          <div class="m-status status-plan">PLANNED</div>
        </div>
      </div>
      <div class="url">meyng.com</div>
    </div>
  </body>
</html>
