<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ConnectZ Introduction — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .dashboard {
        background: #111111;
        border: 1px solid #1a1a2e;
        border-radius: 16px;
        width: 560px;
        padding: 28px 32px;
        margin-bottom: 36px;
      }
      .dash-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .dash-title {
        font-size: 14px;
        font-weight: 600;
        color: #c4c4c4;
      }
      .status-dots {
        display: flex;
        gap: 12px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #c4c4c4;
      }
      .status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .dot-active {
        background: #22c55e;
      }
      .dot-pending {
        background: #f59e0b;
      }
      /* Bar chart */
      .chart {
        display: flex;
        align-items: flex-end;
        gap: 16px;
        height: 120px;
        margin-bottom: 20px;
      }
      .bar {
        width: 48px;
        border-radius: 6px 6px 0 0;
        background: #3b82f6;
      }
      .bar-1 {
        height: 45%;
      }
      .bar-2 {
        height: 75%;
      }
      .bar-3 {
        height: 60%;
      }
      .bar-4 {
        height: 90%;
      }
      .bar-5 {
        height: 55%;
      }
      .bar-6 {
        height: 80%;
      }
      .bar-7 {
        height: 40%;
      }
      /* Line chart */
      .line-chart {
        height: 50px;
        position: relative;
        margin-top: 12px;
      }
      .line-chart svg {
        width: 100%;
        height: 100%;
      }
      /* Labels */
      .product-name {
        font-size: 36px;
        font-weight: 700;
        color: #e9e9e9;
        margin-bottom: 6px;
      }
      .product-sub {
        font-size: 14px;
        font-weight: 400;
        color: #c4c4c4;
      }
      .footer {
        position: absolute;
        bottom: 24px;
        font-size: 12px;
        color: #c4c4c4;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dashboard">
        <div class="dash-header">
          <div class="dash-title">Project Overview</div>
          <div class="status-dots">
            <div class="status">
              <div class="dot dot-active"></div>
              Active
            </div>
            <div class="status">
              <div class="dot dot-pending"></div>
              Pending
            </div>
          </div>
        </div>
        <div class="chart">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
          <div class="bar bar-4"></div>
          <div class="bar bar-5"></div>
          <div class="bar bar-6"></div>
          <div class="bar bar-7"></div>
        </div>
        <div class="line-chart">
          <svg viewBox="0 0 500 50" preserveAspectRatio="none">
            <polyline
              points="0,40 60,30 120,35 180,20 240,25 300,10 360,15 420,8 500,12"
              stroke="#3B82F6"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <polyline
              points="0,40 60,30 120,35 180,20 240,25 300,10 360,15 420,8 500,12"
              stroke="none"
              fill="url(#lineGrad)"
            />
            <defs>
              <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2" />
                <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
      <div class="product-name">ConnectZ</div>
      <div class="product-sub">Smarter Project Management for NGOs</div>
      <div class="footer">MEYNG — AI That Matters</div>
    </div>
  </body>
</html>
