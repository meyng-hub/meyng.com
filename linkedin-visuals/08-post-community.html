<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Post 5 — Call for Community — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .glow {
        position: absolute;
        bottom: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 400px;
        background: radial-gradient(
          ellipse,
          rgba(112, 101, 239, 0.08) 0%,
          transparent 70%
        );
      }
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .title {
        font-size: 56px;
        font-weight: 700;
        color: #e9e9e9;
        margin-bottom: 16px;
      }
      .line {
        width: 80px;
        height: 3px;
        background: #7065ef;
        margin: 0 auto 20px;
        border-radius: 2px;
      }
      .subtitle {
        font-size: 18px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 36px;
      }
      .roles {
        list-style: none;
      }
      .roles li {
        font-size: 18px;
        font-weight: 400;
        color: #e9e9e9;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .diamond {
        width: 8px;
        height: 8px;
        background: #7065ef;
        transform: rotate(45deg);
        margin-right: 16px;
        flex-shrink: 0;
      }
      .contact {
        position: absolute;
        bottom: 28px;
        font-size: 13px;
        font-weight: 500;
        color: #7065ef;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glow"></div>
      <div class="content">
        <div class="title">Join Us</div>
        <div class="line"></div>
        <div class="subtitle">We're looking for:</div>
        <ul class="roles">
          <li>
            <div class="diamond"></div>
            Partners &amp; Collaborators
          </li>
          <li>
            <div class="diamond"></div>
            Investors &amp; Grant Funders
          </li>
          <li>
            <div class="diamond"></div>
            Linguists &amp; Native Speakers
          </li>
          <li>
            <div class="diamond"></div>
            NGOs &amp; Organizations
          </li>
          <li>
            <div class="diamond"></div>
            Developers &amp; Engineers
          </li>
        </ul>
      </div>
      <div class="contact">contact@meyng.com &nbsp;|&nbsp; meyng.com</div>
    </div>
  </body>
</html>
