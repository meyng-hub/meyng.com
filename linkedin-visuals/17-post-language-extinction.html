<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Language Extinction — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 100px;
      }
      .dots {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(112, 101, 239, 0.03) 1px,
          transparent 1px
        );
        background-size: 20px 20px;
      }
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .big-num {
        font-size: 120px;
        font-weight: 800;
        color: #7065ef;
        opacity: 0.15;
        line-height: 1;
        margin-bottom: -20px;
      }
      .stat-main {
        font-size: 32px;
        font-weight: 700;
        color: #e9e9e9;
        margin-bottom: 12px;
      }
      .stat-sub {
        font-size: 18px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 40px;
        line-height: 1.6;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #7065ef;
        margin: 0 auto 24px;
      }
      .question {
        font-size: 24px;
        font-weight: 600;
        color: #7065ef;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dots"></div>
      <div class="content">
        <div class="big-num">40%</div>
        <div class="stat-main">
          of the world's languages have<br />fewer than 1,000 speakers
        </div>
        <div class="stat-sub">
          AI models are trained on fewer than 100 languages.<br />We're
          accelerating extinction by making them invisible.
        </div>
        <div class="line"></div>
        <div class="question">
          What if AI could preserve instead of replace?
        </div>
      </div>
    </div>
  </body>
</html>
