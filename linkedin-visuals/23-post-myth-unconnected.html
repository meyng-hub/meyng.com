<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Myth of the Unconnected — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 100px;
      }
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .cross {
        font-size: 52px;
        font-weight: 800;
        color: #555;
        text-decoration: line-through;
        margin-bottom: 16px;
        text-decoration-color: #ef4444;
        text-decoration-thickness: 4px;
      }
      .correction {
        font-size: 52px;
        font-weight: 800;
        color: #7065ef;
        margin-bottom: 32px;
      }
      .line {
        width: 60px;
        height: 3px;
        background: #7065ef;
        margin: 0 auto 24px;
      }
      .explanation {
        font-size: 18px;
        font-weight: 400;
        color: #c4c4c4;
        line-height: 1.8;
        max-width: 700px;
      }
      .emphasis {
        color: #e9e9e9;
        font-weight: 600;
      }
      .stat {
        margin-top: 32px;
        font-size: 14px;
        color: #555;
      }
      .stat strong {
        color: #7065ef;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="content">
        <div class="cross">"Unconnected"</div>
        <div class="correction">Differently connected.</div>
        <div class="line"></div>
        <div class="explanation">
          They share information through
          <span class="emphasis">voice, SMS, radio, community networks.</span
          ><br />
          Rich knowledge systems that predate the internet by centuries.<br /><br />
          AI can change this — but only if we build it to<br />
          <span class="emphasis">meet people where they are.</span>
        </div>
        <div class="stat">
          <strong>2.7B</strong> people have never used the internet
        </div>
      </div>
    </div>
  </body>
</html>
