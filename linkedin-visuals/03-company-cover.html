<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MEYNG Company Cover — 1128x191</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .cover {
        width: 1128px;
        height: 191px;
        background: linear-gradient(
          to right,
          #0a0a0a 0%,
          #1a1040 30%,
          #28208c 50%,
          #1a1040 70%,
          #0a0a0a 100%
        );
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
      }
      .dots {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(112, 101, 239, 0.05) 1px,
          transparent 1px
        );
        background-size: 20px 20px;
      }
      .logo-area {
        width: 30%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
      .logo-area .m {
        font-size: 52px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
      }
      .logo-area .brand {
        font-size: 14px;
        font-weight: 500;
        color: #e9e9e9;
        letter-spacing: 6px;
        margin-top: 2px;
      }
      .logo-area .logo-group {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .text-area {
        width: 70%;
        padding-left: 20px;
        position: relative;
        z-index: 1;
      }
      .accent-line {
        width: 80px;
        height: 2px;
        background: rgba(112, 101, 239, 0.3);
        margin-bottom: 12px;
      }
      .text-area h2 {
        font-size: 26px;
        font-weight: 700;
        color: #e9e9e9;
        margin-bottom: 6px;
      }
      .text-area p {
        font-size: 14px;
        font-weight: 400;
        color: #c4c4c4;
      }
    </style>
  </head>
  <body>
    <div class="cover">
      <div class="dots"></div>
      <div class="logo-area">
        <div class="logo-group">
          <div class="m">M</div>
          <div class="brand">MEYNG</div>
        </div>
      </div>
      <div class="text-area">
        <div class="accent-line"></div>
        <h2>AI That Matters</h2>
        <p>Building accessible AI for underserved communities</p>
      </div>
    </div>
  </body>
</html>
