<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Opinion Post — Access Not Benchmarks — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 120px;
      }
      .glow {
        position: absolute;
        top: -100px;
        right: -100px;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(112, 101, 239, 0.08) 0%,
          transparent 70%
        );
      }
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .criteria {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 40px;
        align-items: center;
      }
      .criteria-item {
        font-size: 22px;
        font-weight: 400;
        color: #c4c4c4;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .criteria-item .icon {
        color: #7065ef;
        font-size: 20px;
      }
      .emphasis {
        font-size: 28px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 8px;
      }
      .punchline {
        font-size: 48px;
        font-weight: 800;
        color: #7065ef;
        margin-bottom: 36px;
      }
      .cross {
        text-decoration: line-through;
        color: #555;
        font-size: 20px;
        font-weight: 400;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glow"></div>
      <div class="content">
        <div class="criteria">
          <div class="criteria-item">
            Works on a
            <strong style="color: #e9e9e9; margin: 0 4px">2G connection</strong>
          </div>
          <div class="criteria-item">
            On a phone with
            <strong style="color: #e9e9e9; margin: 0 4px"
              >1GB of storage</strong
            >
          </div>
          <div class="criteria-item">
            In a language
            <strong style="color: #e9e9e9; margin: 0 4px"
              >GPT-4 has never seen</strong
            >
          </div>
          <div class="criteria-item">
            For a user who has
            <strong style="color: #e9e9e9; margin: 0 4px"
              >never downloaded an app</strong
            >
          </div>
        </div>
        <div class="cross">Not benchmarks.</div>
        <div class="punchline">Access.</div>
        <div style="font-size: 14px; color: #c4c4c4; margin-top: 12px">
          The real AI challenge of 2026.
        </div>
      </div>
    </div>
  </body>
</html>
