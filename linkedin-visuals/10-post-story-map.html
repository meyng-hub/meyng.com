<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Personal Post — Story Map — 1200x627</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap");
      .card {
        width: 1200px;
        height: 627px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
      }
      /* Simplified Africa outline using CSS */
      .map-area {
        width: 45%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .africa-outline {
        width: 320px;
        height: 360px;
        position: relative;
        opacity: 0.15;
      }
      .africa-outline svg {
        width: 100%;
        height: 100%;
      }
      .pin {
        position: absolute;
        top: 42%;
        left: 55%;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #7065ef;
        box-shadow:
          0 0 20px rgba(112, 101, 239, 0.6),
          0 0 40px rgba(112, 101, 239, 0.3);
      }
      .pin-ring {
        position: absolute;
        top: 42%;
        left: 55%;
        transform: translate(-8px, -8px);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(112, 101, 239, 0.3);
      }
      .text-area {
        width: 55%;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .journey-line {
        font-size: 20px;
        font-weight: 400;
        color: #c4c4c4;
        margin-bottom: 12px;
        line-height: 1.6;
      }
      .journey-bold {
        font-size: 28px;
        font-weight: 700;
        color: #7065ef;
        margin-top: 8px;
        margin-bottom: 32px;
        line-height: 1.4;
      }
      .divider {
        width: 60px;
        height: 2px;
        background: #7065ef;
        margin-bottom: 20px;
      }
      .motto {
        font-size: 16px;
        font-weight: 400;
        color: #e9e9e9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="map-area">
        <div class="africa-outline">
          <svg
            viewBox="0 0 400 450"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M200 10 C230 15 260 20 280 40 C300 55 310 75 320 100 C335 130 340 150 345 175 C350 200 355 230 350 260 C345 290 330 320 310 345 C290 370 265 390 240 405 C220 415 200 425 180 430 C160 425 140 415 120 400 C100 385 85 365 75 340 C65 315 60 290 55 260 C50 230 55 200 60 175 C65 150 75 130 90 105 C105 80 120 60 140 40 C160 25 180 15 200 10 Z"
              stroke="#28208C"
              stroke-width="3"
              fill="none"
            />
          </svg>
        </div>
        <div class="pin"></div>
        <div class="pin-ring"></div>
      </div>
      <div class="text-area">
        <div class="journey-line">Born in Central African Republic.</div>
        <div class="journey-line">Building in Paris.</div>
        <div class="journey-bold">Coding for the world.</div>
        <div class="divider"></div>
        <div class="motto">Technology should serve everyone.</div>
      </div>
    </div>
  </body>
</html>
