<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEYNG | Maintenance</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #e9e9e9;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .container {
        max-width: 480px;
        padding: 2rem;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        border-radius: 16px;
        background: rgba(112, 101, 239, 0.1);
        border: 1px solid rgba(112, 101, 239, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
        letter-spacing: -0.5px;
      }
      .brand {
        background: linear-gradient(135deg, #7065ef, #c4c4c4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        color: #c4c4c4;
        line-height: 1.6;
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
      }
      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #7065ef, transparent);
        margin: 1.5rem auto;
      }
      .contact {
        color: #7065ef;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
      }
      .contact:hover {
        color: #e9e9e9;
      }
      .lang {
        margin-top: 2rem;
        color: #666;
        font-size: 0.8rem;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#128736;</div>
      <h1><span class="brand">MEYNG</span></h1>
      <p>
        We're currently performing scheduled maintenance to improve your
        experience. We'll be back shortly.
      </p>
      <div class="divider"></div>
      <p class="lang">
        Nous effectuons une maintenance pour am&eacute;liorer votre
        exp&eacute;rience. Nous serons de retour sous peu.
      </p>
      <a class="contact" href="mailto:contact@meyng.com">contact@meyng.com</a>
    </div>
  </body>
</html>
